[general]
import = ["~/.config/alacritty/theme_dark.toml"]

[env]
TERM = "xterm-256color"

[window]
padding.x = 20
padding.y = 20
decorations = "Buttonless"
decorations_theme_variant = "dark"
opacity = 0.95
blur = true

[scrolling]
history = 100000

[cursor]
style = { shape = "Beam", blinking = "Always" }
blink_timeout = 0
thickness = 0.25

[font]
normal = { family = "JetBrainsMono Nerd Font" }
size = 11

[selection]
save_to_clipboard = true

